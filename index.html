<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Portfolio – Andrei Manea</title>
    <!-- Base styles so the app and 3D canvas fill the viewport with no gaps -->
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; }
    </style>
  </head>
  <body>
    <!-- React mounts here; main.jsx renders App into this div -->
    <div id="root"></div>
    <!-- Vite entry: type="module" loads our React app from src/main.jsx -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
